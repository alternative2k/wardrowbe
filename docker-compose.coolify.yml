# Coolify Docker Compose
# Builds from source, uses Coolify's reverse proxy instead of nginx.
# The frontend's built-in Next.js rewrites handle /api/v1/* routing to backend.

services:
  postgres:
    image: postgres:15-alpine
    container_name: wardrobe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wardrobe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-wardrobe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wardrobe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wardrobe_net

  redis:
    image: redis:7-alpine
    container_name: wardrobe_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wardrobe_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wardrobe_backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wardrobe}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wardrobe}
      REDIS_URL: redis://redis:6379
      STORAGE_PATH: /data/uploads
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:4141/v1}
      AI_VISION_MODEL: ${AI_VISION_MODEL:-gpt-4o}
      AI_TEXT_MODEL: ${AI_TEXT_MODEL:-gpt-4o}
      AI_TIMEOUT: ${AI_TIMEOUT:-120}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-3}
      AI_INTERNAL_ENABLED: ${AI_INTERNAL_ENABLED:-true}
      AI_VISION_ENABLED: ${AI_VISION_ENABLED:-}
      AI_TEXT_ENABLED: ${AI_TEXT_ENABLED:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      AUTH_TRUST_HEADER: "true"
      AUTH_HEADER_NAME: "Remote-User"
      NTFY_SERVER: ${NTFY_SERVER:-}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      APP_URL: ${APP_URL:-https://localhost:3000}
      OIDC_SKIP_SSL_VERIFY: ${OIDC_SKIP_SSL_VERIFY:-false}
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wardrobe_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wardrobe_worker
    restart: unless-stopped
    command: arq app.workers.worker.WorkerSettings
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-wardrobe}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wardrobe}
      REDIS_URL: redis://redis:6379
      STORAGE_PATH: /data/uploads
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:4141/v1}
      AI_VISION_MODEL: ${AI_VISION_MODEL:-gpt-4o}
      AI_TEXT_MODEL: ${AI_TEXT_MODEL:-gpt-4o}
      AI_TIMEOUT: ${AI_TIMEOUT:-120}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-3}
      AI_INTERNAL_ENABLED: ${AI_INTERNAL_ENABLED:-true}
      AI_VISION_ENABLED: ${AI_VISION_ENABLED:-}
      AI_TEXT_ENABLED: ${AI_TEXT_ENABLED:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NTFY_SERVER: ${NTFY_SERVER:-}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      APP_URL: ${APP_URL:-https://localhost:3000}
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wardrobe_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wardrobe_frontend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3000"
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:?Set NEXTAUTH_URL in .env}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      NEXT_PUBLIC_API_URL: ""
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_END_SESSION_URL: ${OIDC_END_SESSION_URL:-}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wardrobe_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  wardrobe_net:
    driver: bridge
